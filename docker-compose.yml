services:
  db:
    image: postgres:16
    container_name: coedm_db
    restart: always
    env_file: .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the schema file so PostgreSQL runs it on first boot
      - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coedm -d coedm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coedm_backend
    restart: always
    env_file: .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coedm_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  ecom:
    build:
      context: ./ecom
      dockerfile: Dockerfile
    container_name: coedm_ecom
    restart: always
    ports:
      - "81:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
