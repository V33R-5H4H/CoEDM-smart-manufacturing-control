services:
  db:
    image: postgres:16
    container_name: coedm_db
    restart: always
    env_file: .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coedm -d coedm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coedm_backend
    restart: always
    env_file: .env.docker
    # Run migrations automatically, then start FastAPI
    command: bash -c "alembic -c backend/alembic.ini upgrade head && uvicorn backend.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coedm_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  ecom:
    build:
      context: ./ecom
      dockerfile: Dockerfile
    container_name: coedm_ecom
    restart: always
    ports:
      - "81:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
